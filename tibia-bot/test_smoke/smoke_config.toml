# smoke_config.toml — Config efímera para smoke testing automatizado.
# Apunta a un fake bridge en localhost y un puerto HTTP alto para evitar
# colisionar con el 8080 por defecto.

[ndi]
# Nombre irrelevante — no hay fuente NDI en el entorno de test.
# El receiver reintentará cada N segundos; el bot sigue vivo sin frames.
source_name         = "SMOKE-NONEXISTENT"
retry_interval_secs = 5.0

[pico]
bridge_addr         = "127.0.0.1:9000"
connect_timeout_ms  = 3000
command_timeout_ms  = 100
max_backoff_secs    = 2

[http]
listen_addr         = "127.0.0.1:18080"

[loop_config]
target_fps          = 30

[coords]
desktop_total_w           = 1920
desktop_total_h           = 1080
tibia_window_x            = 0
tibia_window_y            = 0
tibia_window_w            = 1920
tibia_window_h            = 1080
game_viewport_offset_x    = 0
game_viewport_offset_y    = 0
game_viewport_w           = 1920
game_viewport_h           = 1080

[actions]
heal_spell            = "F1"      # 0x3A
heal_potion           = "F2"      # 0x3B
mana_spell            = "F3"      # 0x3C
attack_default        = "Space"   # 0x2C
heal_cooldown_ticks   = 10
attack_cooldown_ticks = 30

[scripting]
script_dir     = "tibia-bot/assets/scripts"
tick_budget_ms = 5.0

[safety]
humanize_timing         = true
heal_cd_mean_ms         = 333.0
heal_cd_std_ms          = 83.0
attack_cd_mean_ms       = 1000.0
attack_cd_std_ms        = 200.0
presend_jitter_mean_ms  = 45.0
presend_jitter_std_ms   = 15.0
reaction_hp_mean_ms     = 180.0
reaction_hp_std_ms      = 40.0
reaction_enemy_mean_ms  = 250.0
reaction_enemy_std_ms   = 60.0
max_actions_per_sec     = 8
heal_variation          = true
heal_spell_weight       = 70
heal_potion_weight      = 30
breaks_enabled          = false   # off para el smoke para no esperar minutos
human_noise_enabled     = false
human_noise_keys        = []
human_noise_interval_mean_s = 180.0
human_noise_interval_std_s  = 60.0
prompt_detection_enabled = true
