# cities.toml — Ciudades Tibia 12 con POIs relevantes para level 10-50.
#
# Cada ciudad incluye:
#   - depot_coord: tile absoluto del depot chest principal (x, y, z)
#   - bank_coord: NPC banker (opcional, mismos depots suelen tener banker cerca)
#   - npcs: lista de shopkeepers relevantes (runes, potions, food, gear)
#   - temple_coord: punto de respawn
#   - notes: info operativa
#
# IMPORTANTE: coords son APROXIMADAS basadas en knowledge pre-2026. El usuario
# debe validar con `curl /vision/perception | jq .game_coords` parado sobre
# el tile real. Los coords exactos del depot chest pueden diferir ±2 tiles
# según el server version.
#
# Ref: tibia.fandom.com + TibiaMaps

