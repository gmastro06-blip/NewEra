# vocations.toml — Spells, supplies y equipment por vocación oficial Tibia 12
# para level range 10-50 (Fase 1 del plan).
#
# Cada entrada describe:
#   - heal/attack spells con cost + min level
#   - mana/hp consumo típico (para capacity planning de supplies)
#   - supplies recomendados por sub-rango de level
#   - weapon progression (sólo nombres — templates en assets/templates/inventory/)
#
# Referencia spells: wiki.fandom.com + TibiaMonk (Monk)
# Actualización: 2026-04-19

# ═════════════════════════════════════════════════════════════════════════════
# KNIGHT (tanque melee)
# ═════════════════════════════════════════════════════════════════════════════
[knight]
role         = "tank_melee"
main_stat    = "hp"
hp_priority  = "high"     # se tanquea → HP pot > mana pot
mana_priority = "low"

[knight.spells.heal]
exura_ico     = { level = 8,  mana = 12,  cooldown_s = 1.0, kind = "self_heal", hotkey_default = "F1" }
exura_gran    = { level = 14, mana = 60,  cooldown_s = 1.0, kind = "self_heal_strong", hotkey_default = "F2" }

[knight.spells.buff]
utito_tempo   = { level = 10, mana = 60,  cooldown_s = 120.0, kind = "melee_damage_boost", hotkey_default = "F3" }
utani_hur     = { level = 14, mana = 60,  cooldown_s = 10.0,  kind = "speed_boost", hotkey_default = "F4" }
utamo_tempo   = { level = 12, mana = 30,  cooldown_s = 10.0,  kind = "shield_boost" }
utori_kor     = { level = 20, mana = 115, cooldown_s = 120.0, kind = "pvp_attack_buff" }

[knight.spells.attack]
exori_ico     = { level = 18, mana = 30,  cooldown_s = 6.0, kind = "single_target" }
groeshh       = { level = 35, mana = 40,  cooldown_s = 6.0, kind = "front_area" }
exori         = { level = 42, mana = 160, cooldown_s = 30.0, kind = "area_around" }
exori_min     = { level = 50, mana = 300, cooldown_s = 30.0, kind = "area_big" }

[knight.supplies]
# Supplies típicos por sub-rango. Cantidades orientadas a 2h hunt.
# Los `item_name` deben existir como template en assets/templates/inventory/.
"10-20" = { hp_pot = "health_potion",        hp_qty = 100, mana_pot = "mana_potion",       mana_qty = 50 }
"20-35" = { hp_pot = "strong_health_potion", hp_qty = 100, mana_pot = "strong_mana_potion", mana_qty = 50 }
"35-50" = { hp_pot = "great_health_potion",  hp_qty = 150, mana_pot = "great_mana_potion",  mana_qty = 100 }
food    = { item = "meat", qty = 20 }

[knight.weapons]
"10-15" = ["knight_axe", "barbarian_axe"]
"15-30" = ["headchopper", "warlord_sword"]
"30-50" = ["fire_axe", "thunder_hammer", "queen_bone_sword"]

