# ═════════════════════════════════════════════════════════════════════════════
# MONK (nueva vocación 2025+, fist fighting + harmony/virtue)
# Ref: https://tibia.fandom.com/wiki/Monk, https://www.tibiamonk.com/en/abilities
# ═════════════════════════════════════════════════════════════════════════════
[monk]
role            = "martial_support_hybrid"
main_stat       = "hp+mana_hybrid"
hp_priority     = "medium"
mana_priority   = "medium"
unique_mechanic = "harmony_virtue"    # Builder spells generan Harmony, Spender la consumen
notes           = """
Monks tienen spells categorizados:
  - Builder: generan Harmony (resource) — low mana cost, baja damage
  - Spender: consumen Harmony — high damage single/area
  - Virtue (passive): cuando se genera/gasta Harmony, el party member con menor %HP es healed
Imbuements: Punch (no Slash/Bash/Chop). Top priority: Fist Fighting +4.
"""

[monk.spells.heal]
exura         = { level = 8,  mana = 20,  cooldown_s = 1.0, kind = "self_heal", hotkey_default = "F1" }
exura_gran    = { level = 14, mana = 60,  cooldown_s = 1.0, kind = "self_heal_strong", hotkey_default = "F2" }

[monk.spells.buff]
utani_hur     = { level = 14, mana = 60,  cooldown_s = 10.0, kind = "speed_boost", hotkey_default = "F4" }
# TODO: completar buffs específicos monk (Virtue-related) tras validación wiki

[monk.spells.builder]
# Builder spells: generan Harmony stack. Usados en sustain.
# Placeholders — verificar nombres exactos en wiki
punch_flurry  = { level = 10, mana = 15, cooldown_s = 2.0, harmony_gain = 1, kind = "builder_single" }
palm_strike   = { level = 15, mana = 25, cooldown_s = 4.0, harmony_gain = 2, kind = "builder_area" }

[monk.spells.spender]
# Spender spells: consumen Harmony para damage burst.
dragon_fist   = { level = 20, mana = 50, cooldown_s = 8.0,  harmony_cost = 3, kind = "spender_single" }
tiger_stance  = { level = 30, mana = 100, cooldown_s = 12.0, harmony_cost = 5, kind = "spender_area" }

[monk.supplies]
"10-20" = { hp_pot = "health_potion",        hp_qty = 60,  mana_pot = "mana_potion",       mana_qty = 100 }
"20-35" = { hp_pot = "strong_health_potion", hp_qty = 80,  mana_pot = "strong_mana_potion", mana_qty = 120 }
"35-50" = { hp_pot = "great_health_potion",  hp_qty = 100, mana_pot = "great_mana_potion",  mana_qty = 150 }
food    = { item = "dragon_ham", qty = 20 }

[monk.weapons]
# Fist fighting — hands/gloves son los "weapons"
"10-20" = ["sparring_gloves", "brass_knuckles"]
"20-35" = ["apprentice_fist_wraps", "dragon_fang_knuckles"]
"35-50" = ["master_fist_wraps", "crystal_knuckles"]
# TODO: completar con nombres exactos tras validación wiki
