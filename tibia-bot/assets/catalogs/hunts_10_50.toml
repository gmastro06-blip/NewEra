# ═════════════════════════════════════════════════════════════════════════════
# RESUMEN POR VOCACIÓN / LEVEL (orientativo)
# ═════════════════════════════════════════════════════════════════════════════
# Knight 10-20:  rotworms → orc_fortress → minos
# Knight 20-35:  cyclops → stone_golems → dwarves
# Knight 35-50:  mutated_tigers → hero_cave → corym
#
# Paladin 10-20: rotworms → orc_fortress → cyclops (paladin-friendly por ranged)
# Paladin 20-35: ancient_scarabs (holy) → drakens
# Paladin 35-50: mutated_tigers → hero_cave → asura_palace_low
#
# Druid 10-20:   rotworms → abdendriel_wasps (22+) → orc_fortress
# Druid 20-35:   ancient_scarabs → water_elementals → drakens (exevo flam hur)
# Druid 35-50:   mutated_tigers → hero_cave
#
# Sorcerer 10-20: rotworms → abdendriel_wasps → orc_fortress
# Sorcerer 20-35: water_elementals (sd rune) → drakens
# Sorcerer 35-50: hero_cave → asura_palace_low
#
# Monk 10-20:    rotworms → orc_fortress → minos (fist OK vs humanoids)
# Monk 20-35:    abdendriel_wasps → ancient_scarabs → dwarves
# Monk 35-50:    mutated_tigers → corym_mine → hero_cave
