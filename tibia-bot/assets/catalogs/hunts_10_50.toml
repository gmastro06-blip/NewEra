# hunts_10_50.toml — Catálogo de hunts EXP-focused por level 10-50 por vocación.
#
# Cada hunt tiene:
#   - level_min / level_max: rango recomendado
#   - city: ciudad base (ver cities.toml)
#   - exp_per_hour_estimate: EXP/h esperado solo (para comparar spots)
#   - waste_gp_per_hour: gasto supplies/h aprox
#   - team_size: solo=1, duo=2, team=3+
#   - vocations: lista de voc que aprovechan bien este spot
#   - monsters: lista main de mobs + HP/exp (si conocido)
#   - start_coord: near spawn entrance (user validate)
#   - notes: quirks operativos
#
# Ref: TibiaBuddy EXP guides + comunidad Tibia para valores 2026.
# Los valores exp/h son orientativos; el user debe validar con sus sesiones.

# ═════════════════════════════════════════════════════════════════════════════
