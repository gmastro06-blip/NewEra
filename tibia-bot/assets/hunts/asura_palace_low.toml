# asura_palace_low.toml — Asura Palace lower floors (Port Hope / Banuta access).
# Level 45-70, one of the best profit spots mid-game.

name        = "asura_palace_low"
description = "Asura Palace pisos bajos — slick_water_elemental + diamond_servant + true_dawnfire_asura. Mix de mobs fire/water elementales. Alto XP + alto profit (gems + jewelled drops)."
level_range = [45, 70]
vocation    = "any"

[loot]
# Drops wiki consolidado: slick_water_elemental + diamond_servant + true_dawnfire_asura
# Ref: https://tibia.fandom.com/wiki/Slick_Water_Elemental, /Diamond_Servant, /True_Dawnfire_Asura
# NOTA: small_sapphire NO aparece en los drops (error previo).
stackables = [
    "gold_coin",
    "platinum_coin",
    "crystal_coin",
    "small_topaz",
    "small_emerald",
    "small_diamond",
    "small_ruby",
    "strong_health_potion",
    "strong_mana_potion",
    "great_mana_potion",
    # sin template: blue_gem, red_gem, yellow_gem, small_amethyst,
    #               small_enchanted_ruby, demonic_essence,
    #               flask_of_demonic_blood, iced_soil, red_piece_of_cloth,
    #               shiver_arrow, soul_orb, royal_star, mastermind_potion
]
non_stackables = [
    "magma_coat",                 # true_dawnfire — no template
    "focus_cape",                 # true_dawnfire — no template
    "mystic_turban",              # true_dawnfire — no template
    "oriental_shoes",             # true_dawnfire — no template
    "crystalline_armor",          # diamond_servant — no template
    "golden_lotus_brooch",        # true_dawnfire — no template (raro)
    "peacock_feather_fan",        # true_dawnfire — no template
    "ruby_necklace",              # true_dawnfire — no template
    "mysterious_fetish",          # true_dawnfire — no template
    "death_ring",                 # true_dawnfire — no template
    "might_ring",                 # diamond_servant — no template
    "shockwave_amulet",           # diamond_servant — no template
    "lightning_pendant",          # diamond_servant — no template
    "spellbook_of_mind_control",  # true_dawnfire — no template (raro)
    "wand_of_cosmic_energy",      # diamond_servant — no template
    "wand_of_inferno",            # true_dawnfire — no template
    "bonebreaker",                # diamond_servant — no template
    "crystal_pedestal",           # diamond_servant — no template
    "gear_crystal",               # diamond_servant — no template
    "gear_wheel",                 # diamond_servant — no template
    "life_crystal",               # diamond_servant — no template
]
drop = []

[supplies]
# Asuras pegan fuerte + AOE. Requiere mucha potion.
great_health_potion   = { min = 200, target = 400 }
ultimate_health_potion = { min = 100, target = 250 }
great_mana_potion     = { min = 200, target = 400 }
ultimate_mana_potion  = { min = 100, target = 250 }
ultimate_healing_rune = { min = 50, target = 120 }
sudden_death_rune     = { min = 60, target = 150 }

[monsters]
slick_water_elemental = { hp = 550,  xp = 450 }
diamond_servant       = { hp = 1_000, xp = 700 }
true_dawnfire_asura   = { hp = 8_500, xp = 7_475 }

[metrics]
expected_xp_per_hour    = 280_000
expected_kills_per_hour = 60
expected_loot_gp_per_hour = 60_000
expected_cycle_min      = 120
