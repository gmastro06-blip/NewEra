# corym_mine_port_hope.toml — Corym mines al norte de Port Hope / Banuta.
# Level 35-55, mid-tier XP con loot balanceado.

name        = "corym_mine_port_hope"
description = "Corym charlatan + vanguard + skirmisher en las minas tribales al N de Port Hope. Mix humanoid-like con equipo militar. XP estable, loot medio."
level_range = [35, 55]
vocation    = "any"

[loot]
# Drops wiki consolidado: corym_charlatan + corym_vanguard + corym_skirmisher
# Ref: https://tibia.fandom.com/wiki/Corym_Charlatan, /Corym_Vanguard, /Corym_Skirmisher
# NOTA: coryms NO dropean platinum_coin ni meat (error previo).
#       Los 3 comparten la misma loot table (solo spiky_club es exclusivo de vanguard).
stackables = [
    "gold_coin",
    # sin template: bola, cheese, rat_cheese, soft_cheese
]
non_stackables = [
    "cheese_cutter",         # no template
    "cheesy_figurine",       # no template
    "earflap",               # no template (armor)
    "leather_harness",       # no template (armor)
    "life_preserver",        # no template
    "rat_god_doll",          # no template (raro)
    "ratana",                # no template (weapon)
    "spike_shield",          # no template
    "spiky_club",            # vanguard only — no template
]
drop = []

[supplies]
# Corym mix melee + ranged. Waste medio-alto.
great_health_potion  = { min = 150, target = 300 }
strong_health_potion = { min = 60,  target = 150 }
great_mana_potion    = { min = 100, target = 250 }
strong_mana_potion   = { min = 60,  target = 150 }

[monsters]
corym_charlatan   = { hp = 250, xp = 150 }
corym_vanguard    = { hp = 700, xp = 490 }
corym_skirmisher  = { hp = 450, xp = 260 }

[metrics]
expected_xp_per_hour    = 170_000
expected_kills_per_hour = 130
expected_loot_gp_per_hour = 30_000
expected_cycle_min      = 120
