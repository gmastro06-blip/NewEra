# minos_plains_of_havoc.toml — Minotaurs en Plains of Havoc (Carlin area).
# Level 12-22. Spot newbie clásico.

name        = "minos_plains_of_havoc"
description = "Minotaurs + archers + guards en Plains of Havoc al sur de Carlin. Acceso fácil, bajo waste."
level_range = [12, 22]
vocation    = "any"

[loot]
# Drops wiki-validated 2026-04-20 (Minotaur + Mage + Archer + Guard).
# Removidos: bread (no drop), arrow (no drop — archer dropea bolt/piercing_bolt),
# brass_armor (no drop — el real es brass_helmet del Minotaur), chain_helmet
# (no drop — chain_armor sí), short_sword (no drop).
stackables = [
    "gold_coin",
    "meat",
    "minotaur_leather",     # all minotaurs (template ✓)
    "carrot",               # Minotaur Mage — no template
    "mana_potion",          # Minotaur Mage (template ✓)
    "health_potion",        # Minotaur Guard (template ✓)
    "bolt",                 # Minotaur Archer — no template
    "piercing_bolt",        # Minotaur Archer — no template (rare)
]
non_stackables = [
    "axe",                  # Minotaur — no template
    "mace",                 # Minotaur — no template
    "sword",                # Minotaur — no template
    "shovel",               # Minotaur (template ✓)
    "brass_helmet",         # Minotaur — no template
    "chain_armor",          # Minotaur + Guard — no template
    "plate_shield",         # Minotaur — no template
    "bronze_amulet",        # Minotaur — no template
    "leather_helmet",       # Minotaur Mage — no template
    "leather_legs",         # Minotaur Mage — no template
    "purple_robe",          # Minotaur Mage — no template
    "taurus_mace",          # Minotaur Mage — no template (raro)
    "wand_of_cosmic_energy",# Minotaur Mage — no template
    "torch",                # Minotaur Mage — no template
    "brass_armor",          # Minotaur Archer — no template (NOT minotaur normal)
    "scale_armor",          # Minotaur Archer — no template
    "crossbow",             # Minotaur Archer — no template
    "broken_crossbow",      # Minotaur Archer — no template (raro)
    "battle_shield",        # Minotaur Guard — no template
    "double_axe",           # Minotaur Guard — no template
    "minotaur_horn",        # all minotaurs — no template (trophy)
    "minotaur_trophy",      # Minotaur Guard — no template (raro)
]
drop = []

[supplies]
health_potion = { min = 30, target = 70 }
mana_potion   = { min = 15, target = 40 }
# food (documentación): dragon_ham - no check automático (no template)

[monsters]
minotaur         = { hp = 100, xp = 50 }
minotaur_archer  = { hp = 165, xp = 70 }
minotaur_guard   = { hp = 185, xp = 100 }
minotaur_mage    = { hp = 185, xp = 110 }

[metrics]
expected_xp_per_hour    = 50_000
expected_kills_per_hour = 150
expected_loot_gp_per_hour = 6_000
expected_cycle_min      = 80
