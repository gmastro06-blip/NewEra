# mutated_tigers_yalahar.toml — Mutated Tigers hunt en Yalahar caves.
# Level 35-50, alto XP, hunt típico para level-up rápido mid-game.

name        = "mutated_tigers_yalahar"
description = "Mutated tigers + mutated rats en cuevas bajo Yalahar. Alto XP, lootable para profit moderado."
level_range = [35, 50]
vocation    = "any"

[loot]
# Drops wiki-validated 2026-04-20 (Mutated Tiger):
# Removidos platinum_coin (no drop), mutated_flesh (era confusión con Mutated Rat),
# tiger_eye (no drop), twin_hooks/strange_helmet/brutetamer_staff (eran inventos).
stackables = [
    "gold_coin",
    "meat",
    "strong_health_potion",  # wiki-validated 2026-04-20
    # sin template: striped_fur, sabretooth (drops reales)
]
non_stackables = [
    "angelic_axe",           # wiki — no template (raro alto valor)
    "glorious_axe",          # wiki — no template (raro alto valor)
    "guardian_shield",       # wiki — no template
    "life_ring",             # wiki — no template
    "silky_tapestry",        # wiki — no template (decorativo raro)
]
drop = []

[supplies]
great_health_potion  = { min = 100, target = 200 }
great_mana_potion    = { min = 100, target = 250 }
# food (documentación): dragon_ham - no check automático (no template)

[monsters]
mutated_rat   = { hp = 650,  xp = 450 }
mutated_tiger = { hp = 1_200, xp = 700 }

[metrics]
expected_xp_per_hour    = 200_000
expected_kills_per_hour = 120
expected_loot_gp_per_hour = 35_000
expected_cycle_min      = 120
