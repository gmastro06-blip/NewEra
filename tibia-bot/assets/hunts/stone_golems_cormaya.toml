# stone_golems_cormaya.toml — Stone golems + earth elementals en Cormaya south caves.
# Level 20-35, decent EXP con loot de gems.

name        = "stone_golems_cormaya"
description = "Stone golems en el sur de Cormaya (isla al SE de Edron). Mix con earth_elementals en pisos bajos. Loot de gems stackable + armor drops."
level_range = [20, 35]
vocation    = "any"

[loot]
# Drops wiki consolidado: stone_golem + earth_elemental
# Ref: https://tibia.fandom.com/wiki/Stone_Golem, /Earth_Elemental
# NOTA: el único gem que matchea es small_topaz (earth_elemental).
#       Los stone_golem NO dropean small_diamond/sapphire/emerald
#       (error en versión previa).
stackables = [
    "gold_coin",
    "small_topaz",           # earth_elemental only
    "strong_mana_potion",    # earth_elemental
    # sin template: blank_rune, coal, iron_ore, clay_lump, lump_of_earth,
    #               earth_arrow, small_stone, sulphurous_stone
]
non_stackables = [
    "carlin_sword",          # no template
    "crystal_ring",          # no template
    "might_ring",            # no template (earth_elemental)
    "power_ring",            # no template
    "red_gem",               # gem non-stackable — no template
    "heavily_rusted_armor",  # no template
    "piece_of_marble_rock",  # no template
    "shiny_stone",           # no template
    "ancient_stone",         # no template
]
drop = []

[supplies]
# Stone golem pega melee + earth elemental physical/earth mix.
health_potion        = { min = 50, target = 120 }
strong_health_potion = { min = 30, target = 80 }
mana_potion          = { min = 40, target = 100 }
strong_mana_potion   = { min = 30, target = 80 }

[monsters]
stone_golem     = { hp = 270,  xp = 160 }
earth_elemental = { hp = 650,  xp = 550 }

[metrics]
expected_xp_per_hour    = 85_000
expected_kills_per_hour = 130
expected_loot_gp_per_hour = 18_000
expected_cycle_min      = 120
