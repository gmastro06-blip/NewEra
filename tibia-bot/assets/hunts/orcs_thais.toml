# orcs_thais.toml — Orc Fortress spawn en Thais mountain.
# Level 12-25, spot clásico.

name        = "orcs_thais"
description = "Orc Fortress en las montañas al este de Thais. Mix de orc/warrior/berserker/leader. EXP buena, loot variado."
level_range = [12, 25]
vocation    = "any"

[loot]
# Drops wiki-validated 2026-04-20 (Orc + Warrior + Berserker + Leader).
# Removido platinum_coin: NO drop según wiki (solo gold_coin de orcs).
stackables = [
    "gold_coin",
    "meat",
    "orc_tooth",            # Orc + Warrior + Berserker + Leader (template ✓)
    "orc_leather",          # all orcs (template ✓)
    "ham",                  # Orc Berserker — no template
    "fish",                 # Orc Leader (template ✓)
    "brown_mushroom",       # Orc Leader (template ✓)
    "health_potion",        # Orc Leader (template ✓)
    "royal_spear",          # Orc Leader (template ✓ stackable thrown)
    "throwing_knife",       # Orc Leader (stackable thrown) — no template
]
non_stackables = [
    "axe",                  # Orc — no template
    "sabre",                # Orc — no template
    "studded_armor",        # Orc — no template
    "studded_helmet",       # Orc — no template
    "studded_shield",       # Orc — no template
    "chain_armor",          # Orc Warrior + Berserker — no template
    "copper_shield",        # Orc Warrior — no template
    "battle_axe",           # Orc Berserker — no template
    "halberd",              # Orc Berserker — no template
    "broadsword",           # Orc Leader — no template
    "longsword",            # Orc Leader — no template
    "scimitar",             # Orc Leader — no template
    "warrior_helmet",       # Orc Leader — no template
    "plate_armor",          # Orc Leader — no template
    "plate_legs",           # Orc Leader — no template
    "plate_shield",         # Orc Leader — no template
    "brass_legs",           # Orc Leader — no template
    "skull_belt",           # Orc Warrior + Leader — no template
    "sword_ring",           # Orc Leader — no template (ring stackable)
    # NOTA: 'mace' del profile previo NO es drop según wiki — removido.
]
drop = []

[supplies]
health_potion       = { min = 30, target = 80 }
mana_potion         = { min = 20, target = 60 }
strong_mana_potion  = { min = 10, target = 40 }  # para level 20+
# food (documentación): dragon_ham - no check automático (no template)

[monsters]
orc             = { hp = 70,  xp = 25 }
orc_warrior     = { hp = 125, xp = 50 }
orc_berserker   = { hp = 210, xp = 95 }
orc_leader      = { hp = 420, xp = 190 }

[metrics]
expected_xp_per_hour    = 55_000
expected_kills_per_hour = 180
expected_loot_gp_per_hour = 8_000
expected_cycle_min      = 75
