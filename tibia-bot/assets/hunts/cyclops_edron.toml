# cyclops_edron.toml — Cyclops camp al NE de Edron.
# Level 15-28, loot de cyclops_toe + piggy_bank (raro).

name        = "cyclops_edron"
description = "Cyclops camp NE de Edron — mix de cyclops + cyclops_drone + cyclops_smith."
level_range = [15, 28]
vocation    = "any"

[loot]
# Drops wiki-validated 2026-04-20 (Cyclops + Drone + Smith).
# Removidos: dragon_ham (NO drop — confusión común), cape (no drop),
# studded_helmet (no drop). Cyclops_toe es non-stackable — movido.
stackables = [
    "gold_coin",
    "meat",
    "health_potion",         # Cyclops (template ✓)
    "strong_health_potion",  # Drone + Smith (template ✓)
]
non_stackables = [
    "cyclops_toe",           # all cyclops (template ✓ pero non-stackable)
    "piggy_bank",            # Cyclops (raro alto valor) — template ✓
    "battle_shield",         # all cyclops — no template
    "plate_shield",          # all cyclops — no template
    "halberd",               # Cyclops + Drone — no template
    "short_sword",           # Cyclops + Drone — no template
    "dark_helmet",           # all cyclops — no template (raro)
    "club_ring",             # all cyclops — no template
    "wolf_tooth_chain",      # Cyclops — no template
    "cyclops_trophy",        # all cyclops — no template (raro)
    "battle_axe",            # Smith — no template
    "battle_hammer",         # Smith — no template
    "double_axe",            # Smith — no template
    "heavy_machete",         # Smith — no template
    "spiked_squelcher",      # Smith — no template (raro)
    "heavy_old_tome",        # Cyclops — no template
]
drop = []

[supplies]
health_potion       = { min = 40, target = 90 }
mana_potion         = { min = 20, target = 60 }
strong_mana_potion  = { min = 10, target = 40 }
# food (documentación): dragon_ham - no check automático (no template)

[monsters]
cyclops         = { hp = 260, xp = 150 }
cyclops_drone   = { hp = 385, xp = 195 }
cyclops_smith   = { hp = 470, xp = 260 }

[metrics]
expected_xp_per_hour    = 70_000
expected_kills_per_hour = 100
expected_loot_gp_per_hour = 12_000
expected_cycle_min      = 90
