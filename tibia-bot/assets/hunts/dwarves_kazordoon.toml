# dwarves_kazordoon.toml — Dwarf caves debajo de Kazordoon.
# Level 18-30, low-waste classic.

name        = "dwarves_kazordoon"
description = "Dwarf + dwarf_soldier + dwarf_guard en los túneles bajo Kazordoon. Mix humanoid con alto drop rate de armor/weapons no-stackable. Bajo waste."
level_range = [18, 30]
vocation    = "any"

[loot]
# Drops wiki consolidado: dwarf + dwarf_soldier + dwarf_guard
# Ref: https://tibia.fandom.com/wiki/Dwarf, /Dwarf_Soldier, /Dwarf_Guard
# NOTA: dwarves NO dropean platinum_coin ni meat (error previo).
stackables = [
    "gold_coin",
    "health_potion",         # dwarf_guard
    # sin template: white_mushroom, coal, iron_ore, small_amethyst,
    #               bolt, piercing_bolt
]
non_stackables = [
    "axe",                   # dwarf
    "hatchet",               # dwarf — no template
    "pick",                  # dwarf — no template
    "battle_axe",            # dwarf_soldier — no template
    "battle_hammer",         # dwarf_guard — no template
    "double_axe",            # dwarf_guard — no template
    "copper_shield",         # dwarf — no template
    "dwarven_shield",        # dwarf_soldier — no template
    "battle_shield",         # dwarf_guard — no template
    "chain_armor",           # dwarf_soldier — no template
    "scale_armor",           # dwarf_guard — no template
    "studded_armor",         # dwarf — no template
    "leather_boots",         # dwarf_guard — no template
    "leather_legs",          # dwarf — no template
    "steel_helmet",          # dwarf_guard — no template
    "soldier_helmet",        # dwarf_soldier — no template
    "crossbow",              # dwarf_soldier — no template
    "shovel",                # dwarf_soldier (template ✓)
    "dwarven_ring",          # dwarf — no template (raro)
    "axe_ring",              # dwarf_soldier — no template
]
drop = []

[supplies]
health_potion        = { min = 40, target = 100 }
strong_health_potion = { min = 20, target = 60 }
mana_potion          = { min = 30, target = 80 }

[monsters]
dwarf         = { hp = 90,  xp = 45 }
dwarf_soldier = { hp = 135, xp = 70 }
dwarf_guard   = { hp = 245, xp = 165 }

[metrics]
expected_xp_per_hour    = 80_000
expected_kills_per_hour = 180
expected_loot_gp_per_hour = 12_000
expected_cycle_min      = 120
