# water_elementals_portimi.toml — Water Elementals pre-Svargrond area.
# Level 30-45, mage-friendly (sorcerer con SD, druid con exevo flam hur).

name        = "water_elementals_portimi"
description = "Water elementals en las cuevas pre-Svargrond (Liberty Bay / Port Hope access). Fire-weak mob — druid/sorcerer ideal. Profit alto por gemas."
level_range = [30, 45]
vocation    = "any"

[loot]
stackables = [
    "gold_coin",
    "platinum_coin",
    "small_diamond",         # wiki-validated 2026-04-20
    "small_emerald",         # wiki-validated 2026-04-20
    "strong_health_potion",
    "strong_mana_potion",
    # NOTA 2026-04-20: removidos small_sapphire, small_topaz, white_pearl —
    # Water_Elemental NO los dropea según wiki (eran inventos previos).
    # sin template: green_perch, rainbow_trout (food fish drops)
]
non_stackables = [
    "energy_ring",           # wiki — no template
    "life_ring",             # wiki — no template
    "might_ring",            # wiki — no template (jewelry, no stackable)
    # NOTA: glacier_shoes/amulet/star_amulet/focus_cape eran inventos —
    # Water_Elemental NO los dropea. Removidos.
]
drop = []

[supplies]
strong_health_potion = { min = 50,  target = 120 }
great_mana_potion    = { min = 100, target = 250 }
# food (documentación): dragon_ham - no check automático (no template)
# sorcerer specific
sudden_death_rune    = { min = 30,  target = 100 }
# druid specific alt
ultimate_healing_rune = { min = 30, target = 80 }

[monsters]
water_elemental = { hp = 1_050, xp = 580 }

[metrics]
expected_xp_per_hour    = 150_000
expected_kills_per_hour = 100
expected_loot_gp_per_hour = 40_000
expected_cycle_min      = 120
