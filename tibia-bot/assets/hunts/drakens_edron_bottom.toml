# drakens_edron_bottom.toml — Draken spawns en Edron sewers bottom / Zao.
# Level 30-50, alto waste pero muy alto XP/hr.
# WARNING: drakens son altamente peligrosos — paladin/druid/sorc only.

name        = "drakens_edron_bottom"
description = "Draken warmaster + spellweaver en niveles profundos de Edron sewers (access via Zao corridor). High XP / high waste. Knight NO recomendado (damage output insuficiente, consumo excesivo)."
level_range = [30, 50]
vocation    = "paladin_druid_sorcerer_monk"

[loot]
# Drops wiki consolidado: draken_warmaster + draken_spellweaver
# Ref: https://tibia.fandom.com/wiki/Draken_Warmaster, /Draken_Spellweaver
# NOTA: drakens NO dropean small_topaz ni small_diamond (error previo).
#       El único gem stackable es small_ruby.
stackables = [
    "gold_coin",
    "platinum_coin",
    "small_ruby",
    "meat",
    "great_health_potion",
    "great_mana_potion",
    "ultimate_health_potion",
    # sin template: bamboo_leaves, draken_sulphur
]
non_stackables = [
    "drakinata",                 # warmaster — no template
    "zaoan_halberd",             # warmaster — no template
    "zaoan_armor",               # warmaster — no template
    "zaoan_legs",                # both — no template
    "zaoan_shoes",               # both — no template
    "zaoan_robe",                # spellweaver — no template
    "tower_shield",              # warmaster — no template
    "bone_shoulderplate",        # warmaster — no template
    "warmasters_wristguards",    # warmaster — no template (raro)
    "ring_of_the_sky",           # both — no template (raro)
    "focus_cape",                # spellweaver — no template
    "wand_of_inferno",           # spellweaver — no template
    "spellweavers_robe",         # spellweaver — no template
    "weavers_wandtip",           # spellweaver — no template
    "green_gem",                 # spellweaver — no template (non-stackable gem)
    "draken_trophy",             # spellweaver — no template (trophy)
    "harness",                   # spellweaver — no template
    "luminous_orb",              # spellweaver — no template
]
drop = []

[supplies]
# Drakens pegan MUY duro + combo elemental. HP + mana fluyen rápido.
great_health_potion  = { min = 150, target = 300 }
great_mana_potion    = { min = 200, target = 400 }
# sorcerer/druid
ultimate_healing_rune = { min = 40, target = 100 }
sudden_death_rune     = { min = 50, target = 120 }

[monsters]
draken_warmaster    = { hp = 4_150, xp = 2_400 }
draken_spellweaver  = { hp = 5_000, xp = 3_100 }

[metrics]
expected_xp_per_hour    = 180_000
expected_kills_per_hour = 45
expected_loot_gp_per_hour = 25_000
expected_cycle_min      = 100
