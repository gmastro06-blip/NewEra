# rotworms_darashia.toml — generated by generate_cavebot
# City: darashia (depot 33213,32454,1), Hunt spawn (33172,32473,7)
#
# TODO: calibrar todos los <PLACEHOLDER_*> con /vision/cursor y GIMP.
#       Ver README en assets/cavebot/_templates/ para workflow.

[cavebot]
loop         = true
hunt_profile = "rotworms_darashia"

# ─── Start / initial checkpoint ─────────────────────────────────
[[step]]
kind = "label"
name = "start"

# ─── Check supplies (fall to refill if low) ─────────────────────
[[step]]
kind         = "check_supplies"
on_fail      = "refill"
from_profile = true

# ─── Hunt loop entry ────────────────────────────────────────────
[[step]]
kind = "label"
name = "hunt_loop"

# Walk al spawn point del hunt (33172,32473,7)
# TODO: autogenerar nodes intermedios con path_finder:
#   cargo run --release --bin path_finder -- --walkability assets/walkability.bin \
#       --from 33213,32454,1 --to 33172,32473,7 --simplify
[[step]]
kind = "node"
x = 33172
y = 32473
z = 7

# ─── Stand + loot loop ──────────────────────────────────────────
[[step]]
kind         = "stand"
until        = "enemies_gte(1)"
max_wait_ms  = 15000

[[step]]
kind  = "goto_if"
when  = "not:loot_visible"
label = "no_loot_skip"

[[step]]
kind = "loot"
vx   = 660   # <PLACEHOLDER_LOOT_VX>
vy   = 400   # <PLACEHOLDER_LOOT_VY>

[[step]]
kind = "label"
name = "no_loot_skip"

# TODO: agregar más nodes del hunt loop (siguiente spawn, etc.)

[[step]]
kind  = "goto"
label = "start"

# ═════════════════════════════════════════════════════════════════
# REFILL ROUTE
# ═════════════════════════════════════════════════════════════════

[[step]]
kind = "label"
name = "refill"

# Walk al depot (33213,32454,1)
[[step]]
kind = "node"
x = 33213
y = 32454
z = 1

# ─── Deposit loot ───────────────────────────────────────────────
# TODO: calibrar slot_vx/slot_vy con /vision/cursor sobre cada bag.
# El bloque se repite 1x por cada backpack abierto (ajustar vy +68 por bag).
[[step]]
kind         = "stow_all_items"
slot_vx      = 1585   # <PLACEHOLDER_STOW_SLOT_VX>
slot_vy      = 22     # <PLACEHOLDER_STOW_SLOT_VY>
menu_offset_x = 87
menu_offset_y = 258
menu_wait_ms    = 600
stow_process_ms = 1200
max_iterations  = 6
from_profile    = true

# ─── Walk al NPC shopkeeper ─────────────────────────────────────
# NPC 'Alesar' @ (33210,32450,1)
[[step]]
kind = "node"
x = 33210
y = 32450
z = 1

# ─── Trade ──────────────────────────────────────────────────────
# Tibia 12: `trade` command abre la ventana sin click al bag icon.
# Los bag_button_vx/vy son fallback por si el NPC no acepta `trade`.
[[step]]
kind             = "open_npc_trade"
greeting_phrases = ["hi", "trade"]
bag_button_vx    = 150   # <PLACEHOLDER_BAG_VX> fallback
bag_button_vy    = 300   # <PLACEHOLDER_BAG_VY> fallback
wait_button_ms   = 1500

# Comprar mana potions (filtrar por nombre primero)
[[step]]
kind        = "type_in_field"
field_vx    = 180   # <PLACEHOLDER_SEARCH_FIELD_VX>
field_vy    = 150   # <PLACEHOLDER_SEARCH_FIELD_VY>
text        = "mana potion"
wait_after_click_ms = 200

[[step]]
kind        = "buy_item"
item_vx     = 200   # <PLACEHOLDER_ITEM_VX>
item_vy     = 300   # <PLACEHOLDER_ITEM_VY>
amount_vx   = 400
amount_vy   = 500
confirm_vx  = 480
confirm_vy  = 540
quantity    = 100
spacing_ms  = 200

# ─── Cerrar trade y volver al hunt ──────────────────────────────
[[step]]
kind  = "goto"
label = "hunt_loop"
