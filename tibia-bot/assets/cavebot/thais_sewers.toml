# thais_sewers.toml — Knight, Thais Sewers Z=8 (Cave Rats / Rats)
#
# Loop completo basado en coordenadas reales del mapa:
#   WP2  (32013,32099)  corredor norte       → primera sala
#   WP3  (32010,32104)  bifurcación norte    → heal_check
#   WP4  (32006,32110)  sala central norte   → Rats + Cave Rats
#   WP5  (32018,32110)  corredor este        → Cave Rats
#   WP6  (32024,32115)  fondo este           → 3-4 Cave Rats dense
#   WP7  (32010,32115)  corredor central     → camino suroeste
#   WP8  (32003,32118)  zona suroeste        → MAYOR DENSIDAD
#   WP9  (31998,32122)  fondo suroeste       → corredor estrecho
#   WP10 (32002,32112)  giro norte regreso   →
#   WP11 (32008,32107)  sala central sur     → pre-subida
#
# Velocidad base: 450ms/tile knight sin buff. Ajustar si se atasca:
#   - Llega muy lejos: bajar duration_ms en ese walk
#   - No llega: subir duration_ms
#
# Iniciar con char ya dentro del sewer (Z=8), posicionado en corredor norte.
# Hot-reload: curl -X POST 'http://localhost:8080/cavebot/load?path=assets/cavebot/thais_sewers.toml&enabled=true'

[cavebot]
loop = true

# ═══════════════════════════════════════════════════════════════════
# LOOP START — WP2: corredor norte (32013, 32099)
# ═══════════════════════════════════════════════════════════════════

[[step]]
kind = "label"
name = "wp2_corredor_norte"

[[step]]
kind = "stand"
until = "mobs_killed(2)"
max_wait_ms = 25000

# WP2→WP3: dy=+5 (S), dx=-3 (W)
[[step]]
kind = "walk"
key = "S"
duration_ms = 2300
interval_ms = 400

[[step]]
kind = "walk"
key = "A"
duration_ms = 1400
interval_ms = 400

# ═══════════════════════════════════════════════════════════════════
# WP3: bifurcación norte (32010, 32104)
