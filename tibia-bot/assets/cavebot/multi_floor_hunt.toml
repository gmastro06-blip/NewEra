x = 32656
y = 31674
z = 7

[[step]]
kind = "wait"
duration_ms = 1500

# ── Ahora en Z6 ──────────────────────────────────────────────────────

[[step]]
kind = "node"
x = 32666
y = 31686
z = 6

[[step]]
kind = "node"
x = 32681
y = 31687
z = 6

# ======================================================================
# CHECK TIME — Decidir si hacer otra ronda o terminar
# ======================================================================

# TODO: ajustar condicion si quieres limitar por kills/tiempo.
# Por ahora: siempre volver a refill (loop infinito).
[[step]]
kind = "goto"
label = "start"
