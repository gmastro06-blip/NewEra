# ── Ahora en Z7 ──────────────────────────────────────────────────────

# ======================================================================
# COUNT / CHECK — Decidir si seguir cazando o salir
# ======================================================================

# Si mana OK, seguir cazando. Si mana < 30%, salir a refill.
[[step]]
kind = "goto_if"
label = "hunt"
when = "not:mana_below(0.30)"

# ======================================================================
# LEAVE — Volver a superficie (Z7 -> Z6)
# ======================================================================

[[step]]
