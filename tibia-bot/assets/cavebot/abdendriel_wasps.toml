# abdendriel_wasps.toml — Cavebot Ab'dendriel Wasps (druida level 11)
#
# Convertido 2026-04-15 desde los waypoints originales del usuario
# (formato BlackD-style → formato nativo del bot).
#
# IMPORTANTE: Char centrado en Ab'dendriel (NO en Carlin — son ciudades
# distintas con coordenadas distintas). Las coords de refill/depot son las
# que tú me pasaste en tus waypoints; si la ubicación real del depot/NPC
# en tu Ab'dendriel es diferente, ajustar los nodes de la sección REFILL.
#
# Flujo completo:
#   start / refill → deposit Ab'dendriel → NPC sell/buy → check supplies
#                 → go_hunt → ladder z=6→7 → walk to wasp cave entry
#                 → hunt (z=7 → z=8 → z=9 → z=10 vía ladders)
#                 → ropes para subir (z=10 → z=9 → z=8 → z=7)
#                 → leave → ladder z=7→6 → depot → goto start
#
# Hotkeys usadas:
#   F6 = Rope (coincide con tu hotbar, item count "1")
#
# ═══════════════════════════════════════════════════════════════════════
# CALIBRACIÓN PRE-RUN (obligatoria antes del primer hunt)
# ═══════════════════════════════════════════════════════════════════════
#
# Hay 4 coords de click a calibrar (marcadas "CALIBRAR:" en el archivo):
#   - (chest_vx, chest_vy): centro del depot chest en el frame
#   - (stow_vx,  stow_vy):  opción "Stow all" en el context menu del chest
#   - (item_vx,  item_vy):  mana potion en la trade window
#   - (confirm_vx, confirm_vy): botón confirm/buy en la trade window
#
# Procedimiento (3-5 min por par):
#
#   1. Arrancar bot + bridge + tener el char en el juego
#   2. Caminar char a 1-sqm del depot chest en Ab'dendriel
#   3. curl http://localhost:8080/test/grab -o depot_frame.png
#   4. Abrir depot_frame.png en GIMP (u otro viewer con cursor crosshair)
#   5. Medir coord del chest: hover el cursor sobre el centro del chest, leer
#      "x: 1XXX  y: YYY" en la barra inferior de GIMP. Anotar chest_vx/vy.
#   6. Right-click manualmente el chest en el cliente para abrir el context menu
#   7. curl http://localhost:8080/test/grab -o depot_menu_frame.png
#   8. Medir coord de "Stow all" en el menú. Anotar stow_vx/vy.
#   9. Repetir para el NPC: caminar al NPC, trigger trade manualmente, capture
#      frames, medir item_vx/vy y confirm_vx/vy.
#  10. Editar los 4 pares de coords en este archivo (líneas con "CALIBRAR:")
#  11. Validar: ./target/release/lint_cavebot.exe assets/cavebot/abdendriel_wasps.toml
#      Esperado: "0 errors, 0 warnings"
#
# Pro-tip: medir con GIMP garantiza precisión píxel-a-píxel. Evitar el
# "ojímetro". Los clicks del bot son absolutos, un error de 10 px puede
# caer en un item adyacente o fuera del botón.
#
# Cargar con:
#   curl -X POST 'http://localhost:8080/cavebot/load?path=assets/cavebot/abdendriel_wasps.toml&enabled=true'
#
# Monitoring durante la sesión:
#   curl -s http://localhost:8080/cavebot/status | jq .
#   curl -s http://localhost:8080/vision/matcher/stats | jq .
#
# ═══════════════════════════════════════════════════════════════════════

[cavebot]
loop = true

# ═══════════════════════════════════════════════════════════════
# LABELS DE ENTRADA
# ═══════════════════════════════════════════════════════════════

[[step]]
kind = "label"
name = "start"

[[step]]
kind = "label"
name = "refill"

# ═══════════════════════════════════════════════════════════════
# REFILL — Ab'dendriel depot + NPC potions
# ═══════════════════════════════════════════════════════════════

# Walk to Ab'dendriel depot (ajustar coord si tu depot real está en otro sitio)
[[step]]
kind = "node"
x = 32681
y = 31686
z = 6
max_wait_ms = 30000

# Deposit: right-click depot chest → "Stow all"
[[step]]
kind = "deposit"
chest_vx     = 1850   # CALIBRAR: centro del depot chest visible en el frame
chest_vy     = 300
stow_vx      = 1880   # CALIBRAR: opción "Stow all" del context menu
stow_vy      = 340
menu_wait_ms = 300
process_ms   = 800

# Walk to NPC shopkeeper (intermediate nodes para evitar stuck en pillars)
[[step]]
kind = "node"
x = 32681
y = 31669
z = 6
max_wait_ms = 30000

[[step]]
kind = "node"
x = 32670
y = 31660
z = 6
max_wait_ms = 30000

# Stand next to NPC
[[step]]
kind = "node"
x = 32670
y = 31659
z = 6
max_wait_ms = 30000

[[step]]
kind = "stand"
until = "no_combat"
max_wait_ms = 5000

# TODO: action sell — requires sell_item step (no implementado aún).
# Workaround: por ahora abrir trade directamente y comprar (el deposit
# ya movió el loot a la bag que Stow all limpia al regresar). Si quieres
# vender loot específico, hazlo manualmente antes de arrancar la sesión.
#
# Alternativa futura: añadir sell_item step al cavebot runner.

# Buy 100 mana potions
[[step]]
kind = "npc_dialog"
phrases = ["hi", "trade"]
wait_prompt_ms = 1500

[[step]]
kind = "buy_item"
item_vx    = 120     # CALIBRAR: posición del mana potion en el trade window
item_vy    = 340
confirm_vx = 300     # CALIBRAR: botón confirm/buy
confirm_vy = 520
quantity   = 100
spacing_ms = 150

[[step]]
kind = "npc_dialog"
phrases = ["bye"]
wait_prompt_ms = 500

# Step away from NPC
[[step]]
kind = "node"
x = 32669
y = 31663
z = 6
max_wait_ms = 30000

[[step]]
kind = "stand"
until = "no_combat"
max_wait_ms = 5000

# Verify supplies before going back to hunt
[[step]]
kind = "check_supplies"
on_fail = "refill"
requirements = [
    { item = "mana_potion", min_count = 3 },
]

