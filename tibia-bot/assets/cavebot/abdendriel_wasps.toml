# abdendriel_wasps.toml — Cavebot Ab'dendriel Wasps (druida level 11)
#
# Convertido 2026-04-15 desde los waypoints originales del usuario
# (formato BlackD-style → formato nativo del bot).
#
# IMPORTANTE: Char centrado en Ab'dendriel (NO en Carlin — son ciudades
# distintas con coordenadas distintas). Las coords de refill/depot son las
# que tú me pasaste en tus waypoints; si la ubicación real del depot/NPC
# en tu Ab'dendriel es diferente, ajustar los nodes de la sección REFILL.
#
# Flujo completo:
#   start / refill → deposit Ab'dendriel → NPC sell/buy → check supplies
#                 → go_hunt → ladder z=6→7 → walk to wasp cave entry
#                 → hunt (z=7 → z=8 → z=9 → z=10 vía ladders)
#                 → ropes para subir (z=10 → z=9 → z=8 → z=7)
#                 → leave → ladder z=7→6 → depot → goto start
#
# Hotkeys usadas:
#   F6 = Rope (coincide con tu hotbar, item count "1")
#
# ═══════════════════════════════════════════════════════════════════════
# CALIBRACIÓN PRE-RUN (obligatoria antes del primer hunt)
# ═══════════════════════════════════════════════════════════════════════
#
# Hay 4 coords de click a calibrar (marcadas "CALIBRAR:" en el archivo):
#   - (slot_vx, slot_vy): primer slot del bag (arriba-izquierda del bag panel)
#     donde cae el primer item stackable del loot. Right-click aquí abre el
#     menu context con "Stow all items of this type".
#   - (menu_offset_x, menu_offset_y): offset desde el slot hasta la línea
#     "Stow all items of this type" del menu. El menu aparece a la DERECHA
#     del click (no directo abajo). Típico: +90 X, +197 Y.
#   - (item_vx, item_vy): mana potion en la trade window del NPC
#   - (confirm_vx, confirm_vy): botón confirm/buy en la trade window
#
# NOTA 2026-04-16 v2: el diseño anterior "stow_bag" (right-click al container
# + click en "Stow container's content") era INCORRECTO. Tibia oficial NO
# tiene esa opción en el menu del container. Correcto: right-click SOBRE un
# item del bag → menu tiene "Stow all items of this type". Los items del
# mismo tipo (todo el stack de mana potions, todo el gold, etc) van al Stash.
# Para depositar múltiples tipos, se itera N veces sobre slot 0 (los items
# se reacomodan después de cada stow).
#
# Ver TibiaWiki: https://tibia.fandom.com/wiki/Your_Supply_Stash
#
# Procedimiento calibración (10-15 min con GIMP):
#
#   1. Arrancar bot + bridge + tener el char en el juego al lado del depot
#   2. Abrir el bag con loot (ya debería estar abierto en la UI)
#   3. curl http://localhost:8080/test/grab -o depot_frame.png
#   4. Abrir depot_frame.png en GIMP (o cualquier viewer con cursor coord)
#   5. Medir slot 0 del bag: hover sobre el primer slot del bag panel.
#      Anotar slot_vx/vy.
#   6. Right-click manual sobre ese slot (item) — el menu aparece a la derecha
#   7. Manteniendo el menu abierto, curl /test/grab -o menu_frame.png
#      (NDI probablemente NO captura el menu; si no aparece, ir al paso 8)
#   8. Sin NDI capture del menu, estimación alternativa:
#      - El menu aparece a la derecha del click, typical +90 px X
#      - "Stow all items of this type" es la línea ~10-11 del menu
#      - Cada línea ~18 px → offset_y ≈ 11 × 18 = 197 px
#      - Empezar con defaults (90, 197) y ajustar si el bot clickea mal
#   9. Repetir para el NPC trade: capture frame con trade window abierta,
#      medir item_vx/vy (mana potion en la lista) y confirm_vx/vy (botón Buy).
#  10. Editar coords en este archivo (líneas con "CALIBRAR:")
#  11. Validar: ./target/release/lint_cavebot.exe assets/cavebot/abdendriel_wasps.toml
#      Esperado: "0 errors" (warnings de orphan labels OK).
#
# Pro-tip para validar stow_all_items sin arriesgar loot:
#   - Cargar el cavebot paused, hacer un run MANUAL en un depot seguro
#   - Observar visualmente si los 2 clicks caen en los lugares correctos
#   - Si menu clickea mal (open, use, move up, etc), ajustar menu_offset_y
#
# Cargar con:
#   curl -X POST 'http://localhost:8080/cavebot/load?path=assets/cavebot/abdendriel_wasps.toml&enabled=true'
#
# Monitoring durante la sesión:
#   curl -s http://localhost:8080/cavebot/status | jq .
#   curl -s http://localhost:8080/vision/matcher/stats | jq .
#
# ═══════════════════════════════════════════════════════════════════════

[cavebot]
loop = true

# ═══════════════════════════════════════════════════════════════
# LABELS DE ENTRADA
# ═══════════════════════════════════════════════════════════════

[[step]]
kind = "label"
name = "start"

[[step]]
kind = "label"
name = "refill"

# ═══════════════════════════════════════════════════════════════
# REFILL — Ab'dendriel depot + NPC potions
# ═══════════════════════════════════════════════════════════════

# Walk to Ab'dendriel depot (ajustar coord si tu depot real está en otro sitio)
[[step]]
kind = "node"
x = 32681
y = 31686
z = 6
max_wait_ms = 30000

# Stow: iterativo per-item. Right-click al slot 0 del bag → click en
# "Stow all items of this type" del menu. Repite N veces para depositar
# todos los tipos stackables. Los items se reacomodan entre iteraciones.
#
# Modern Tibia 12: el menu context del CONTAINER no tiene "Stow container's
# content" — hay que hacerlo per-item con "Stow all items of this type".
#
# Items non-stackables (gear con imbue, rares) quedan en el bag — OK para
# sesión supervisada, el operador los deposita manualmente entre sesiones.
#
# Ver TibiaWiki: https://tibia.fandom.com/wiki/Your_Supply_Stash
#
# Calibración 2026-04-16 v3 (V7 desbloqueado, cavebot via Arduino HID):
#   - Detección automática via análisis del frame actual:
#     Bag 1 title top y=0,   slot icon center y=30  (Backpack)
#     Bag 2 title top y=60,  slot icon center y=90  (Golden Backpack)
#     Bag 3 title top y=120, slot icon center y=150 (Green Backpack) STOW ✓
#     Bag 4 title top y=185, slot icon center y=215 (Bag) STOW ✓
#   - bag_h ≈ 60 entre bags (excepto bag4 que tiene +5 por layout)
#   - Validado live: RC (1585,150) abre context menu con "Stow all items of this type"
#   - menu_offset re-medir con V7 live ahora que el click produce menu

# Stow Green Backpack (bag 3)
[[step]]
kind = "stow_all_items"
slot_vx         = 1585
slot_vy         = 150
menu_offset_x   = 92
menu_offset_y   = 190
menu_wait_ms    = 300
stow_process_ms = 800
max_iterations  = 6

# Stow Bag (bag 4)
[[step]]
kind = "stow_all_items"
slot_vx         = 1585
slot_vy         = 215
menu_offset_x   = 92
menu_offset_y   = 190
menu_wait_ms    = 300
stow_process_ms = 800
max_iterations  = 6

# Walk to NPC shopkeeper (intermediate nodes para evitar stuck en pillars)
[[step]]
kind = "node"
x = 32681
y = 31669
z = 6
max_wait_ms = 30000

[[step]]
kind = "node"
x = 32670
y = 31660
z = 6
max_wait_ms = 30000

# Stand next to NPC
[[step]]
kind = "node"
x = 32670
y = 31659
z = 6
max_wait_ms = 30000

[[step]]
kind = "stand"
until = "no_combat"
max_wait_ms = 5000

# TODO: action sell — requires sell_item step (no implementado aún).
# Workaround: por ahora abrir trade directamente y comprar (el deposit
# ya movió el loot a la bag que Stow all limpia al regresar). Si quieres
# vender loot específico, hazlo manualmente antes de arrancar la sesión.
#
# Alternativa futura: añadir sell_item step al cavebot runner.

# Buy 100 mana potions
[[step]]
kind = "npc_dialog"
phrases = ["hi", "trade"]
wait_prompt_ms = 1500

[[step]]
kind = "buy_item"
item_vx    = 120     # CALIBRAR: posición del mana potion en el trade window
item_vy    = 340
confirm_vx = 300     # CALIBRAR: botón confirm/buy
confirm_vy = 520
quantity   = 100
spacing_ms = 150

[[step]]
kind = "npc_dialog"
phrases = ["bye"]
wait_prompt_ms = 500

# Step away from NPC
[[step]]
kind = "node"
x = 32669
y = 31663
z = 6
max_wait_ms = 30000

[[step]]
kind = "stand"
until = "no_combat"
max_wait_ms = 5000

# Verify supplies before going back to hunt
[[step]]
kind = "check_supplies"
on_fail = "refill"
requirements = [
    { item = "mana_potion", min_count = 3 },
]

