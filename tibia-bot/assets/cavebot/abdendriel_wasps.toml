# TODO: action sell — requires sell_item step (no implementado aún).
# Workaround: por ahora abrir trade directamente y comprar (el deposit
# ya movió el loot a la bag que Stow all limpia al regresar). Si quieres
# vender loot específico, hazlo manualmente antes de arrancar la sesión.
#
# Alternativa futura: añadir sell_item step al cavebot runner.

# Buy 100 mana potions — Tibia 12 Shiriel flow.
# Calibrado live 2026-04-17 con hover-mouse + GetCursorPos (ver session note
# Obsidian). El NPC es Shiriel (el saludo "Ashari" es palabra druida de hola).
# Flujo completo:
#   1. OpenNpcTrade: say "hi" → click icono bag del greeting → abre trade
#   2. TypeInField: click "Ty to search" → type "mana potion" → filtra lista
#   3. BuyItem (amount flow): click row → click Amount → type "100" → click Buy
#   4. Ladder (click bye): cerrar interacción con NPC
#
# Coords live calibrados:
#   bag_button:          (163, 301)   — icono bag del greeting window
#   search_field:        (426, 261)   — "Type to search" de la trade window
#   mana_potion_row:     (380, 129)   — row mana potion en lista filtrada
#   amount_field:        (394, 292)   — input Amount
#   buy_button:          (480, 327)   — botón Buy
#   bye_button:          (117, 298)   — icono mano rojo (cierra chat)

# 1. Say "hi" + click bag icon
# Verify: tras el click al bag icon, la trade window debe renderizar.
# Si el template npc_trade no aparece en 4s → SafetyPause con reason
# diagnosticable "verify_failed" (vs 12 clicks fantasma del bug pre-ADR-003).
[[step]]
kind = "open_npc_trade"
greeting_phrases = ["hi"]
bag_button_vx    = 163
bag_button_vy    = 301
wait_button_ms   = 1500

[step.verify]
template   = "npc_trade"
timeout_ms = 4000
on_fail    = "safety_pause"

# 2. Click "Ty to search" + type "mana potion" para filtrar lista
[[step]]
kind = "type_in_field"
field_vx            = 426
field_vy            = 261
text                = "mana potion"
wait_after_click_ms = 200
wait_after_type_ms  = 400

# 3. Buy 100 mana potions con amount flow: click row → click amount → type "100" → click Buy
# Verify: postcondition real del buy → inventario de mana_potion debe aumentar
# ≥ 50 unidades (bought 100, margen por si stack se reparte o algo falla
# parcialmente). require_positive=true rechaza deltas negativos.
# Si timeout → SafetyPause (probablemente NPC no vendió o sin gold suficiente).
[[step]]
kind = "buy_item"
item_vx    = 380
item_vy    = 129
amount_vx  = 394
amount_vy  = 292
confirm_vx = 480
confirm_vy = 327
quantity   = 100
spacing_ms = 250

[step.verify]
inventory_delta = { item = "mana_potion", min_abs_delta = 50, require_positive = true }
timeout_ms      = 5000
on_fail         = "safety_pause"

# 4. Click bye icon para cerrar chat con NPC (usamos Ladder semánticamente)
# Verify: tras el bye click, la trade window debe cerrar. Si sigue abierta
# en 2s → probablemente el click cayó fuera del bye icon. SafetyPause.
[[step]]
kind = "ladder"
vx = 117
vy = 298

[step.verify]
absent_template = "npc_trade"
timeout_ms      = 2000
on_fail         = "safety_pause"

[[step]]
kind = "wait"
duration_ms = 500

# Step away from NPC
[[step]]
kind = "node"
x = 32669
y = 31663
z = 6
max_wait_ms = 30000

[[step]]
kind = "stand"
until = "no_combat"
max_wait_ms = 5000

# Verify supplies before going back to hunt
# from_profile = true toma las thresholds del hunt profile declarado en
# [cavebot].hunt_profile ("abdendriel_wasps"). Equivalente a una lista
# inline pero sin duplicar config — si el profile cambia, este check
# automáticamente usa los nuevos valores.
[[step]]
kind = "check_supplies"
on_fail = "refill"
from_profile = true

